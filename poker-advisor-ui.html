<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>♠ Poker Advisor</title>

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=JetBrains+Mono:wght@300;400;500&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #080e0b; --bg2: #0e1a13; --felt: #0f2318; --felt2: #142b1e;
            --gold: #c8a84b; --gold2: #e8c96d; --red: #c0392b; --text: #e8dfc8;
            --text2: #9aab9e; --text3: #556b5f; --border: rgba(200,168,75,0.18); --card-bg: #f5f0e8;
        }

        body {
            background-color: var(--bg); color: var(--text);
            font-family: 'Outfit', sans-serif; margin: 0; padding: 0;
            display: flex; flex-direction: column; min-height: 100vh;
        }

        h1, h2, h3, .card-value { font-family: 'Cormorant Garamond', serif; }

        header {
            border-bottom: 1px solid var(--border); padding: 15px 30px;
            display: flex; justify-content: space-between; align-items: center; background: var(--bg2);
        }

        header h1 { color: var(--gold); margin: 0; font-weight: 500; }

        .app-layout {
            display: flex;
            flex: 1;
        }

        .main-content {
            flex: 1; /* Ocupa o resto da tela */
            padding-bottom: 50px;
        }

        .history-sidebar {
            width: 320px;
            background: var(--bg2);
            border-left: 1px solid var(--border);
            padding: 20px;
            overflow-y: auto;
            height: calc(100vh - 71px); /* Compensa o header */
        }

        .history-title {
            color: var(--gold); font-family: 'JetBrains Mono', monospace; font-size: 14px;
            text-align: center; margin-top: 0; border-bottom: 1px dashed var(--border); padding-bottom: 15px; margin-bottom: 20px;
        }
        .history-card {
            background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
            padding: 15px; margin-bottom: 15px; font-family: 'JetBrains Mono', monospace; font-size: 13px;
        }
        .history-card .date { font-size: 11px; color: var(--text3); margin-bottom: 8px; text-align: right; }
        .history-card .row { display: flex; justify-content: space-between; margin-bottom: 5px; }
        .win { color: #4caf80; font-weight: bold; }
        .lose { color: #ef9a9a; font-weight: bold; }
        .neutral { color: #e8c96d; font-weight: bold; }

        .poker-table-container { display: flex; justify-content: center; align-items: center; padding: 40px; }
        .poker-table {
            width: 500px; height: 250px;
            background: radial-gradient(ellipse, var(--felt) 40%, var(--felt2) 100%);
            border-radius: 250px / 125px; border: 5px solid var(--bg);
            box-shadow: 0 0 0 3px var(--felt2), 0 0 0 4px var(--felt), 0 20px 50px rgba(0,0,0,0.5);
            position: relative;
        }
        .pos-btn {
            position: absolute; background: var(--bg2); border: 1px solid var(--border);
            color: var(--text); padding: 8px 12px; border-radius: 5px;
            font-family: 'JetBrains Mono', monospace; cursor: pointer; transition: 0.3s;
            transform: translate(-50%, -50%);
        }
        .pos-btn:hover { border-color: var(--gold); color: var(--gold); }
        .pos-btn.selected { border-color: var(--gold); color: var(--gold); background: rgba(200,168,75,0.15); }
        #pos-mp { top: 0%; left: 20%; } #pos-co { top: 0%; left: 80%; } #pos-btn { top: 50%; left: 100%; }
        #pos-sb { top: 100%; left: 80%; } #pos-bb { top: 100%; left: 20%; } #pos-utg { top: 50%; left: 0%; }

        .hero-panel, .board-panel, .villain-panel { text-align: center; margin-top: 10px; }
        .hero-cards { display: flex; justify-content: center; gap: 20px; margin: 15px 0; }
        .card-slot {
            width: 70px; height: 98px; border: 2px dashed var(--border); border-radius: 9px;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            font-family: 'Cormorant Garamond', serif; cursor: pointer; transition: 0.3s;
            background: rgba(0,0,0,0.2); color: var(--gold); font-size: 24px;
        }
        .card-slot:hover { border-color: var(--gold); background: rgba(200,168,75,0.1); }
        .card-slot.filled { background: var(--card-bg); border: 2px solid var(--gold); border-style: solid; }
        .card-slot .val { font-size: 32px; font-weight: 600; line-height: 1; }
        .card-slot .suit { font-size: 24px; line-height: 1; }
        .suit-red { color: var(--red); } .suit-black { color: #111; }
        .gold-btn {
            background: var(--gold); color: var(--bg); border: none; padding: 12px 25px;
            font-family: 'Outfit', sans-serif; font-weight: 600; font-size: 16px; border-radius: 6px; cursor: pointer; transition: 0.3s;
        }
        .gold-btn:disabled { background: var(--border); color: var(--text3); cursor: not-allowed; }
        .gold-btn:not(:disabled):hover { background: var(--gold2); }
        .villain-btn-group { display: flex; justify-content: center; gap: 10px; margin-top: 15px; }
        .villain-btn {
            background: var(--bg2); border: 1px solid var(--border); color: var(--text2);
            padding: 8px 16px; border-radius: 5px; font-family: 'Outfit', sans-serif; cursor: pointer; transition: 0.3s;
        }
        .villain-btn:hover { border-color: var(--gold); color: var(--gold); }
        .villain-btn.selected { background: rgba(200,168,75,0.15); border-color: var(--gold); color: var(--gold); font-weight: 600; }
        .drawer-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(8, 14, 11, 0.90);
            display: flex; justify-content: center; align-items: center; z-index: 200;
        }
        .drawer-overlay.hidden { display: none; }
        .drawer-panel { background: var(--bg2); border: 2px solid var(--gold); padding: 25px; border-radius: 12px; max-width: 900px; text-align: center; }
        .drawer-row { display: flex; justify-content: center; gap: 8px; margin-bottom: 12px; }
        .drawer-card {
            width: 50px; height: 75px; background: var(--card-bg); border: 2px solid transparent; border-radius: 6px;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            font-family: 'Cormorant Garamond', serif; cursor: pointer; transition: 0.2s; user-select: none;
        }
        .drawer-card .d-val { font-size: 24px; font-weight: 600; line-height: 1; }
        .drawer-card .d-suit { font-size: 20px; line-height: 1; }
        .drawer-card:hover:not(.disabled) { transform: translateY(-3px); box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .drawer-card.selected { border-color: var(--gold); background: var(--gold); }
        .drawer-card.selected .d-val, .drawer-card.selected .d-suit { color: var(--bg) !important; }
        .drawer-card.disabled { opacity: 0.2; cursor: not-allowed; filter: grayscale(100%); }
        .board-stages { display: flex; justify-content: center; align-items: stretch; gap: 30px; margin-top: 15px; }
        .stage-col { display: flex; flex-direction: column; align-items: center; }
        .stage-label { font-family: 'JetBrains Mono', monospace; font-size: 13px; color: var(--gold); margin-bottom: 15px; letter-spacing: 2px; text-transform: uppercase; }
        .stage-content { display: flex; align-items: center; justify-content: center; min-height: 102px; }
        .stage-divider { width: 1px; background: dashed 1px var(--border); }

        .allin-input {
            background: var(--bg); border: 1px solid var(--border); color: var(--text);
            padding: 8px 10px; border-radius: 5px; font-family: 'JetBrains Mono', monospace;
            font-size: 14px; width: 110px; text-align: center;
        }
        .allin-input:focus { outline: none; border-color: var(--gold); }
        .allin-input::placeholder { color: var(--text3); }
        .allin-result-box {
            border: 1px solid currentColor; padding: 10px 24px; border-radius: 6px;
            display: inline-block; font-size: 18px; font-weight: 700; margin-top: 12px;
        }
    </style>
</head>
<body>
<header>
    <h1>♠ Poker Advisor <span style="font-size: 14px; color: var(--text3);">(Tracker Edition)</span></h1>
    <button onclick="reiniciarMesa()" style="background:transparent; border:1px solid var(--border); color:var(--text3); padding:7px 16px; border-radius:5px; font-family:'JetBrains Mono',monospace; font-size:13px; cursor:pointer; transition:0.3s;"
        onmouseover="this.style.borderColor='var(--red)';this.style.color='var(--red)';"
        onmouseout="this.style.borderColor='var(--border)';this.style.color='var(--text3)';">
        ↺ Nova Mão
    </button>
</header>

<div class="app-layout">

    <main class="main-content">
        <div class="poker-table-container">
            <div class="poker-table">
                <button class="pos-btn" id="pos-mp">MP</button>
                <button class="pos-btn" id="pos-co">CO</button>
                <button class="pos-btn" id="pos-btn">BTN</button>
                <button class="pos-btn" id="pos-sb">SB</button>
                <button class="pos-btn" id="pos-bb">BB</button>
                <button class="pos-btn" id="pos-utg">UTG</button>
            </div>
        </div>

        <div class="hero-panel">
            <label style="font-family: 'JetBrains Mono', monospace; color: var(--text2); font-size: 14px;">SUAS CARTAS</label>
            <div style="margin-top: 15px;" id="hero-btn-container">
                <button class="gold-btn" onclick="abrirGaveta('hero', 2)">Escolher Cartas</button>
            </div>
            <div class="hero-cards" id="hero-slots" style="display: none;" onclick="abrirGaveta('hero', 2)" title="Clique para editar">
                <div class="card-slot" id="hero-slot-0"></div>
                <div class="card-slot" id="hero-slot-1"></div>
            </div>
            <button id="btn-analisar" class="gold-btn" style="margin-top: 10px;" disabled>Ver Recomendação</button>
            <h2 id="resultado-api" style="font-size: 24px; margin-top: 15px; letter-spacing: 1px; color: var(--text2);">Escolha sua posição e cartas para começar</h2>
        </div>

        <div class="villain-panel" style="margin-top: 20px; border-top: 1px dashed var(--border); padding-top: 20px;">
            <label style="font-family: 'JetBrains Mono', monospace; color: var(--text2); font-size: 14px;">TIPO DE OPONENTE</label>
            <div class="villain-btn-group">
                <button class="villain-btn selected" data-perfil="tight">Conservador</button>
                <button class="villain-btn" data-perfil="loose">Agressivo</button>
                <button class="villain-btn" data-perfil="maniaco">Maníaco</button>
            </div>
        </div>

        <div class="board-panel" style="margin-top: 20px; border-top: 1px dashed var(--border); padding-top: 20px; padding-bottom: 50px;">
            <label style="font-family: 'JetBrains Mono', monospace; color: var(--text2); font-size: 14px;">MESA (BOARD)</label>
            <div class="board-stages">
                <div class="stage-col">
                    <span class="stage-label">Flop</span>
                    <div class="stage-content">
                        <button id="btn-open-flop" class="gold-btn" onclick="abrirGaveta('flop', 3)" disabled>Adicionar Flop</button>
                        <div class="hero-cards" id="flop-slots" style="display: none; margin: 0;">
                            <div class="card-slot" id="board-slot-0" onclick="abrirGaveta('flop', 3)"></div>
                            <div class="card-slot" id="board-slot-1" onclick="abrirGaveta('flop', 3)"></div>
                            <div class="card-slot" id="board-slot-2" onclick="abrirGaveta('flop', 3)"></div>
                        </div>
                    </div>
                </div>
                <div class="stage-divider"></div>
                <div class="stage-col">
                    <span class="stage-label">Turn</span>
                    <div class="stage-content">
                        <button id="btn-open-turn" class="gold-btn" onclick="abrirGaveta('turn', 1)" style="display: none;">+ 4ª Carta</button>
                        <div class="hero-cards" id="turn-slot-container" style="display: none; margin: 0;">
                            <div class="card-slot" id="board-slot-3" onclick="abrirGaveta('turn', 1)"></div>
                        </div>
                    </div>
                </div>
                <div class="stage-divider"></div>
                <div class="stage-col">
                    <span class="stage-label">River</span>
                    <div class="stage-content">
                        <button id="btn-open-river" class="gold-btn" onclick="abrirGaveta('river', 1)" style="display: none;">+ 5ª Carta</button>
                        <div class="hero-cards" id="river-slot-container" style="display: none; margin: 0;">
                            <div class="card-slot" id="board-slot-4" onclick="abrirGaveta('river', 1)"></div>
                        </div>
                    </div>
                </div>
            </div>
            <div id="resultado-equidade" style="display:none; margin-top:25px;">
                <p id="label-calculando" style="font-family:'JetBrains Mono',monospace; font-size:13px; color:var(--text3); margin:0 0 14px;"></p>
                <div style="display:flex; justify-content:center; align-items:center; gap:35px; margin-bottom:14px;">
                    <div style="text-align:center;">
                        <div id="pct-heroi" style="font-family:'Cormorant Garamond',serif; font-size:52px; font-weight:600; line-height:1; color:var(--text2);">—</div>
                        <div style="font-size:11px; color:var(--text3); letter-spacing:2px; margin-top:6px;">VOCÊ</div>
                    </div>
                    <div style="font-size:20px; color:var(--text3);">vs</div>
                    <div style="text-align:center;">
                        <div id="pct-vilao" style="font-family:'Cormorant Garamond',serif; font-size:52px; font-weight:600; line-height:1; color:var(--text2);">—</div>
                        <div style="font-size:11px; color:var(--text3); letter-spacing:2px; margin-top:6px;">OPONENTE</div>
                    </div>
                </div>
                <div style="height:8px; border-radius:4px; background:var(--felt2); overflow:hidden; max-width:320px; margin:0 auto 12px;">
                    <div id="barra-equidade" style="height:100%; width:50%; background:#4caf80; transition:width 0.6s ease;"></div>
                </div>
                <p id="info-mao-atual" style="font-family:'JetBrains Mono',monospace; font-size:14px; color:var(--gold); margin:10px 0 0;"></p>
                <p id="info-outs" style="font-family:'JetBrains Mono',monospace; font-size:13px; color:var(--text2); margin:4px 0 0;"></p>
            </div>
        </div>

        <!-- CALCULADORA DE ALL-IN -->
        <div id="allin-panel" style="display:none; margin-top:0; border-top:1px dashed var(--border); padding:20px 20px 30px; text-align:center;">
            <label style="font-family:'JetBrains Mono',monospace; color:var(--text2); font-size:14px; letter-spacing:1px;">VALE O ALL-IN?</label>
            <div style="display:flex; gap:20px; justify-content:center; margin-top:14px; flex-wrap:wrap; align-items:flex-end;">
                <div style="text-align:left;">
                    <div style="font-size:11px; color:var(--text3); margin-bottom:5px; letter-spacing:1px;">POTE ATUAL</div>
                    <input class="allin-input" id="input-pot" type="number" min="0" placeholder="ex: 100">
                </div>
                <div style="text-align:left;">
                    <div style="font-size:11px; color:var(--text3); margin-bottom:5px; letter-spacing:1px;">VALOR DO CALL</div>
                    <input class="allin-input" id="input-call" type="number" min="0" placeholder="ex: 50">
                </div>
                <button class="gold-btn" onclick="calcularAllin()" style="padding:9px 20px; font-size:14px;">Calcular</button>
            </div>
            <div id="resultado-allin" style="margin-top:18px; font-family:'JetBrains Mono',monospace;"></div>
        </div>
    </main>

    <aside class="history-sidebar">
        <h3 class="history-title">HISTÓRICO DE PARTIDAS</h3>
        <div id="history-container">
            <div style="color: var(--text3); font-size: 13px; text-align: center;">Nenhuma partida simulada ainda.</div>
        </div>
    </aside>

</div>

<div id="drawer-overlay" class="drawer-overlay hidden">
    <div class="drawer-panel">
        <h3 style="margin-top: 0; color: var(--gold);">Selecione <span id="drawer-count-needed">X</span> cartas</h3>
        <div id="drawer-container"></div>
        <div style="margin-top: 20px; display: flex; justify-content: center; gap: 15px;">
            <button id="btn-confirm-drawer" class="gold-btn" disabled onclick="confirmarGaveta()">Confirmar Seleção</button>
            <button class="gold-btn" style="background: transparent; border: 1px solid var(--border); color: var(--text);" onclick="fecharGaveta()">Cancelar</button>
        </div>
    </div>
</div>

<script>
    let posicaoSelecionada = null; let maoHeroi = []; let cartasBoard = [null, null, null, null, null];
    let perfilVilaoSelecionado = 'tight'; let contextoAtual = ''; let qtdCartasNecessarias = 0; let gavetaSelecaoTemporaria = [];
    let equidadeAtual = null;

    const btnAnalisar = document.getElementById('btn-analisar'); const displayResultado = document.getElementById('resultado-api');
    const btnOpenFlop = document.getElementById('btn-open-flop'); const btnOpenTurn = document.getElementById('btn-open-turn');
    const btnOpenRiver = document.getElementById('btn-open-river'); const flopSlots = document.getElementById('flop-slots');
    const turnSlotContainer = document.getElementById('turn-slot-container'); const riverSlotContainer = document.getElementById('river-slot-container');
    const resultadoEquidade = document.getElementById('resultado-equidade'); const drawerOverlay = document.getElementById('drawer-overlay');
    const drawerContainer = document.getElementById('drawer-container'); const btnConfirmDrawer = document.getElementById('btn-confirm-drawer');

    // MESA E BOTÕES
    document.querySelectorAll('.pos-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            document.querySelectorAll('.pos-btn').forEach(b => b.classList.remove('selected'));
            this.classList.add('selected'); posicaoSelecionada = this.innerText; verificarProntidao();
        });
    });

    document.querySelectorAll('.villain-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            document.querySelectorAll('.villain-btn').forEach(b => b.classList.remove('selected'));
            this.classList.add('selected'); perfilVilaoSelecionado = this.getAttribute('data-perfil');
            if (cartasBoard[0] !== null) rodarMonteCarlo();
        });
    });

    // GAVETA UNIVERSAL
    const naipesOrdem = [{ s: '♦', c: 'suit-red' }, { s: '♠', c: 'suit-black' }, { s: '♥', c: 'suit-red' }, { s: '♣', c: 'suit-black' }];
    const valoresOrdem = ['A', 'K', 'Q', 'J', 'T', '9', '8', '7', '6', '5', '4', '3', '2'];

    function construirGaveta() {
        drawerContainer.innerHTML = '';
        naipesOrdem.forEach(naipeObj => {
            const linha = document.createElement('div'); linha.className = 'drawer-row';
            valoresOrdem.forEach(val => {
                const idCarta = val + naipeObj.s; const cartaDiv = document.createElement('div');
                cartaDiv.className = 'drawer-card'; cartaDiv.id = `drawer-c-${idCarta}`;
                cartaDiv.innerHTML = `<span class="d-val ${naipeObj.c}">${val}</span><span class="d-suit ${naipeObj.c}">${naipeObj.s}</span>`;
                cartaDiv.onclick = () => clicarCartaGaveta(cartaDiv, val, naipeObj.s); linha.appendChild(cartaDiv);
            }); drawerContainer.appendChild(linha);
        });
    }

    function abrirGaveta(contexto, qtd) {
        contextoAtual = contexto; qtdCartasNecessarias = qtd; document.getElementById('drawer-count-needed').innerText = qtd; construirGaveta();
        if (contexto === 'hero') gavetaSelecaoTemporaria = maoHeroi.filter(c => c);
        else if (contexto === 'flop') gavetaSelecaoTemporaria = cartasBoard.slice(0, 3).filter(c => c);
        else if (contexto === 'turn') gavetaSelecaoTemporaria = cartasBoard.slice(3, 4).filter(c => c);
        else if (contexto === 'river') gavetaSelecaoTemporaria = cartasBoard.slice(4, 5).filter(c => c);
        gavetaSelecaoTemporaria.forEach(carta => { const el = document.getElementById(`drawer-c-${carta.valor}${carta.naipe}`); if(el) el.classList.add('selected'); });
        let bloqueio = []; if (contexto !== 'hero') bloqueio.push(...maoHeroi); if (contexto !== 'flop') bloqueio.push(...cartasBoard.slice(0, 3));
        if (contexto !== 'turn') bloqueio.push(...cartasBoard.slice(3, 4)); if (contexto !== 'river') bloqueio.push(...cartasBoard.slice(4, 5));
        bloqueio.filter(c => c).forEach(carta => { const el = document.getElementById(`drawer-c-${carta.valor}${carta.naipe}`); if(el) el.classList.add('disabled'); });
        btnConfirmDrawer.disabled = gavetaSelecaoTemporaria.length !== qtdCartasNecessarias; drawerOverlay.classList.remove('hidden');
    }

    function fecharGaveta() { drawerOverlay.classList.add('hidden'); }
    function clicarCartaGaveta(elemento, valor, naipe) {
        if (elemento.classList.contains('disabled')) return;
        const i = gavetaSelecaoTemporaria.findIndex(c => c.valor === valor && c.naipe === naipe);
        if (i > -1) { gavetaSelecaoTemporaria.splice(i, 1); elemento.classList.remove('selected'); }
        else if (gavetaSelecaoTemporaria.length < qtdCartasNecessarias) { gavetaSelecaoTemporaria.push({ valor, naipe }); elemento.classList.add('selected'); }
        btnConfirmDrawer.disabled = gavetaSelecaoTemporaria.length !== qtdCartasNecessarias;
    }

    function confirmarGaveta() {
        if (contextoAtual === 'hero') {
            maoHeroi = [...gavetaSelecaoTemporaria]; document.getElementById('hero-btn-container').style.display = 'none';
            document.getElementById('hero-slots').style.display = 'flex'; desenharSlot('hero-slot-0', maoHeroi[0]); desenharSlot('hero-slot-1', maoHeroi[1]); verificarProntidao();
        } else {
            if (contextoAtual === 'flop') {
                cartasBoard[0] = gavetaSelecaoTemporaria[0]; cartasBoard[1] = gavetaSelecaoTemporaria[1]; cartasBoard[2] = gavetaSelecaoTemporaria[2];
                desenharSlot('board-slot-0', cartasBoard[0]); desenharSlot('board-slot-1', cartasBoard[1]); desenharSlot('board-slot-2', cartasBoard[2]);
                btnOpenFlop.style.display = 'none'; flopSlots.style.display = 'flex'; if(!cartasBoard[3]) btnOpenTurn.style.display = 'inline-block';
            } else if (contextoAtual === 'turn') {
                cartasBoard[3] = gavetaSelecaoTemporaria[0]; desenharSlot('board-slot-3', cartasBoard[3]);
                btnOpenTurn.style.display = 'none'; turnSlotContainer.style.display = 'flex'; if(!cartasBoard[4]) btnOpenRiver.style.display = 'inline-block';
            } else if (contextoAtual === 'river') {
                cartasBoard[4] = gavetaSelecaoTemporaria[0]; desenharSlot('board-slot-4', cartasBoard[4]); btnOpenRiver.style.display = 'none'; riverSlotContainer.style.display = 'flex';
            }
            rodarMonteCarlo();
        }
        fecharGaveta();
    }

    function desenharSlot(idEl, carta) {
        const slot = document.getElementById(idEl); if (!carta) return; slot.classList.add('filled');
        const c = (carta.naipe === '♥' || carta.naipe === '♦') ? 'suit-red' : 'suit-black';
        slot.innerHTML = `<span class="val ${c}">${carta.valor}</span><span class="suit ${c}">${carta.naipe}</span>`;
    }

    function gerarNotacaoGTO() {
        const peso = { 'A':14, 'K':13, 'Q':12, 'J':11, 'T':10, '9':9, '8':8, '7':7, '6':6, '5':5, '4':4, '3':3, '2':2 };
        let c1 = maoHeroi[0]; let c2 = maoHeroi[1]; if (peso[c2.valor] > peso[c1.valor]) { let t = c1; c1 = c2; c2 = t; }
        return (c1.valor === c2.valor) ? c1.valor + c2.valor : c1.valor + c2.valor + (c1.naipe === c2.naipe ? 'S' : 'O');
    }

    function traduzirAcao(acao) {
        const mapa = { 'RAISE': 'Aumentar (Raise)', 'CALL': 'Pagar (Call)', 'FOLD': 'Desistir (Fold)', 'CHECK': 'Passar (Check)' };
        return mapa[acao] || acao;
    }
    function traduzirPerfil(perfil) {
        const mapa = { 'tight': 'Conservador', 'loose': 'Agressivo', 'maniaco': 'Maníaco' };
        return mapa[perfil] || perfil;
    }

    function verificarProntidao() {
        if (posicaoSelecionada && maoHeroi.length === 2) {
            btnAnalisar.disabled = false; btnOpenFlop.disabled = false;
            displayResultado.innerText = `Pronto: ${gerarNotacaoGTO()} em ${posicaoSelecionada}`; displayResultado.style.color = "var(--gold)";
        }
    }

    btnAnalisar.addEventListener('click', () => {
        const mao = gerarNotacaoGTO(); displayResultado.innerText = "Consultando..."; displayResultado.style.color = "var(--text)";
        fetch(`/api/gto?pos=${posicaoSelecionada}&mao=${mao}`).then(r => r.json()).then(d => {
            displayResultado.innerText = `${mao} em ${posicaoSelecionada}: ${d.descricao || traduzirAcao(d.acao)}`;
            displayResultado.style.color = (d.acao === 'RAISE') ? '#4caf80' : (d.acao === 'CALL' ? '#e8c96d' : '#ef9a9a');
        });
    });

    function rodarMonteCarlo() {
        const infoMao = document.getElementById('info-mao-atual');
        const infoOuts = document.getElementById('info-outs');
        const allinPanel = document.getElementById('allin-panel');

        resultadoEquidade.style.display = 'block';
        document.getElementById('label-calculando').innerText = `Calculando vs ${traduzirPerfil(perfilVilaoSelecionado)}...`;
        document.getElementById('pct-heroi').innerText = '...';
        document.getElementById('pct-heroi').style.color = 'var(--text2)';
        document.getElementById('pct-vilao').innerText = '...';
        document.getElementById('pct-vilao').style.color = 'var(--text2)';
        document.getElementById('barra-equidade').style.width = '50%';
        infoMao.style.display = 'none';
        infoOuts.style.display = 'none';
        allinPanel.style.display = 'none';
        equidadeAtual = null;

        const heroStr = maoHeroi.map(c => c.valor + c.naipe).join(',');
        const boardStr = cartasBoard.filter(c => c).map(c => c.valor + c.naipe).join(',');

        fetch(`/api/equidade?hero=${encodeURIComponent(heroStr)}&board=${encodeURIComponent(boardStr)}&vilao=${perfilVilaoSelecionado}`)
            .then(r => r.json())
            .then(dados => {
                equidadeAtual = dados.equidade;
                const pctH = (dados.equidade * 100).toFixed(1);
                const pctV = (100 - dados.equidade * 100).toFixed(1);
                const corHeroi = dados.equidade >= 0.6 ? '#4caf80' : dados.equidade >= 0.4 ? '#e8c96d' : '#ef9a9a';
                const corVilao = dados.equidade <= 0.4 ? '#4caf80' : dados.equidade <= 0.6 ? '#e8c96d' : '#ef9a9a';

                document.getElementById('label-calculando').innerText = `vs ${traduzirPerfil(perfilVilaoSelecionado)}`;
                document.getElementById('pct-heroi').innerText = pctH + '%';
                document.getElementById('pct-heroi').style.color = corHeroi;
                document.getElementById('pct-vilao').innerText = pctV + '%';
                document.getElementById('pct-vilao').style.color = corVilao;
                document.getElementById('barra-equidade').style.width = pctH + '%';
                document.getElementById('barra-equidade').style.background = corHeroi;

                if (dados.mao_atual) {
                    infoMao.innerText = `Sua mão: ${dados.mao_atual}`;
                    infoMao.style.display = 'block';
                }
                if (dados.outs_resumo && dados.outs_resumo !== 'Sem outs claros.' && dados.total_outs > 0) {
                    infoOuts.innerText = `Outs: ${dados.outs_resumo} (${dados.total_outs} no total)`;
                    infoOuts.style.display = 'block';
                }

                document.getElementById('resultado-allin').innerHTML = '';
                allinPanel.style.display = 'block';
                carregarHistorico();
            });
    }

    function calcularAllin() {
        const resultDiv = document.getElementById('resultado-allin');
        if (equidadeAtual === null) {
            resultDiv.innerHTML = '<span style="color:var(--text3)">Simule uma mão primeiro para calcular.</span>';
            return;
        }
        const pot  = parseFloat(document.getElementById('input-pot').value);
        const call = parseFloat(document.getElementById('input-call').value);
        if (!pot || !call || pot <= 0 || call <= 0) {
            resultDiv.innerHTML = '<span style="color:var(--text3)">Preencha o pote e o valor do call.</span>';
            return;
        }

        const equidadeNecessaria = call / (pot + call);
        const ev   = equidadeAtual * (pot + call) - call;
        const vale = equidadeAtual >= equidadeNecessaria;
        const margem = Math.abs(equidadeAtual - equidadeNecessaria) * 100;
        const corVeredicto = vale ? '#4caf80' : '#ef9a9a';

        resultDiv.innerHTML = `
            <div style="display:flex; gap:28px; justify-content:center; flex-wrap:wrap; margin-bottom:14px;">
                <div style="text-align:center;">
                    <div style="font-size:11px; color:var(--text3); letter-spacing:1px; margin-bottom:4px;">MÍNIMO NECESSÁRIO</div>
                    <div style="font-size:24px; font-weight:600; color:var(--text2);">${(equidadeNecessaria*100).toFixed(1)}%</div>
                </div>
                <div style="text-align:center;">
                    <div style="font-size:11px; color:var(--text3); letter-spacing:1px; margin-bottom:4px;">SUA EQUIDADE</div>
                    <div style="font-size:24px; font-weight:600; color:${corVeredicto};">${(equidadeAtual*100).toFixed(1)}%</div>
                </div>
                <div style="text-align:center;">
                    <div style="font-size:11px; color:var(--text3); letter-spacing:1px; margin-bottom:4px;">EV ESPERADO</div>
                    <div style="font-size:24px; font-weight:600; color:${ev>=0?'#4caf80':'#ef9a9a'};">${ev>=0?'+':''}${ev.toFixed(0)}</div>
                </div>
            </div>
            <div class="allin-result-box" style="color:${corVeredicto}; border-color:${corVeredicto};">
                ${vale ? '✓ VALE O ALL-IN' : '✗ NÃO VALE O ALL-IN'}
            </div>
            <div style="font-size:12px; color:var(--text3); margin-top:8px;">
                ${vale ? `${margem.toFixed(1)}% acima do ponto de equilíbrio` : `${margem.toFixed(1)}% abaixo do ponto de equilíbrio`}
            </div>
        `;
    }

    function carregarHistorico() {
        fetch('/api/historico')
            .then(r => r.json())
            .then(dados => {
                const container = document.getElementById('history-container');
                container.innerHTML = '';

                if (dados.length === 0) {
                    container.innerHTML = '<div style="color: var(--text3); font-size: 13px; text-align: center;">Nenhuma partida simulada ainda.</div>';
                    return;
                }

                dados.forEach(item => {
                    const pct = (item.equidade * 100).toFixed(1);
                    let corClass = 'lose';
                    if (item.equidade >= 0.6) corClass = 'win';
                    else if (item.equidade >= 0.4) corClass = 'neutral';

                    const formatBoard = item.board ? item.board.replace(/,/g, ' ') : '—';
                    const formatHero = item.mao_heroi.replace(/,/g, ' ');

                    const div = document.createElement('div');
                    div.className = 'history-card';
                    div.innerHTML = `
                        <div class="date">${item.data_hora}</div>
                        <div class="row"><span>Suas cartas:</span> <span style="color:var(--gold)">${formatHero}</span></div>
                        <div class="row"><span>Mesa:</span> <span style="color:var(--text2)">${formatBoard}</span></div>
                        <div class="row"><span>Oponente:</span> <span>${traduzirPerfil(item.perfil_vilao)}</span></div>
                        <div class="row" style="margin-top: 10px; border-top: 1px dashed var(--border); padding-top: 10px;">
                            <span>Chance de ganhar:</span> <span class="${corClass}">${pct}%</span>
                        </div>
                    `;
                    container.appendChild(div);
                });
            });
    }

    function reiniciarMesa() {
        // Estado
        posicaoSelecionada = null;
        maoHeroi = [];
        cartasBoard = [null, null, null, null, null];
        equidadeAtual = null;

        // Posições
        document.querySelectorAll('.pos-btn').forEach(b => b.classList.remove('selected'));

        // Cartas do herói
        document.getElementById('hero-btn-container').style.display = 'block';
        document.getElementById('hero-slots').style.display = 'none';
        ['hero-slot-0','hero-slot-1'].forEach(id => {
            const el = document.getElementById(id);
            el.classList.remove('filled'); el.innerHTML = '';
        });

        // Board
        ['board-slot-0','board-slot-1','board-slot-2','board-slot-3','board-slot-4'].forEach(id => {
            const el = document.getElementById(id);
            el.classList.remove('filled'); el.innerHTML = '';
        });
        btnOpenFlop.style.display = 'inline-block'; btnOpenFlop.disabled = true;
        flopSlots.style.display = 'none';
        btnOpenTurn.style.display = 'none'; turnSlotContainer.style.display = 'none';
        btnOpenRiver.style.display = 'none'; riverSlotContainer.style.display = 'none';

        // Resultados
        btnAnalisar.disabled = true;
        displayResultado.innerText = 'Escolha sua posição e cartas para começar';
        displayResultado.style.color = 'var(--text2)';
        resultadoEquidade.style.display = 'none';
        document.getElementById('allin-panel').style.display = 'none';
        document.getElementById('resultado-allin').innerHTML = '';
        document.getElementById('input-pot').value = '';
        document.getElementById('input-call').value = '';
    }

    window.onload = carregarHistorico;

</script>
</body>
</html>
