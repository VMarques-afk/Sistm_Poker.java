<!DOCTYPE html>
<html lang = "pt-BR">
<head>
    <meta charset = "UTF-8">
    <meta name = "viewport" content = "width=device-width, initial-scale=1.0">
    <title>♠ Poker Advisor</title>

    <link href = "https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=JetBrains+Mono:wght@300;400;500&family=Outfit:wght@300;400;500&display=swap"
          rel = "stylesheet">

    <style>
        :root {
            --bg: #080e0b;
            --bg2: #0e1a13;
            --felt: #0f2318;
            --felt2: #142b1e;
            --gold: #c8a84b;
            --gold2: #e8c96d;
            --red: #c0392b;
            --text: #e8dfc8;
            --text2: #9aab9e;
            --text3: #556b5f;
            --border: rgba(200,168,75,0.18);
            --card-bg: #f5f0e8;
        }

        body {
            background-color: var(--bg); color: var(--text);
            font-family: 'Outfit', sans-serif; margin: 0; padding: 0;
            display: flex; flex-direction: column; min-height: 100vh;
        }

        h1, h2, h3, .card-value { font-family: 'Cormorant Garamond', serif; }
        .tech-label, .gto-notation { font-family: 'JetBrains Mono', monospace; }

        header {
            border-bottom: 1px solid var(--border); padding: 15px 30px;
            display: flex; justify-content: space-between; align-items: center; background: var(--bg2);
        }

        header h1 { color: var(--gold); margin: 0; font-weight: 500; }

        .poker-table-container { display: flex; justify-content: center; align-items: center; padding: 40px; }

        .poker-table {
            width: 500px; height: 250px;
            background: radial-gradient(ellipse, var(--felt) 40%, var(--felt2) 100%);
            border-radius: 250px / 125px; border: 5px solid var(--bg);
            box-shadow: 0 0 0 3px var(--felt2), 0 0 0 4px var(--felt), 0 20px 50px rgba(0,0,0,0.5);
            position: relative;
        }

        .pos-btn {
            position: absolute; background: var(--bg2); border: 1px solid var(--border);
            color: var(--text); padding: 8px 12px; border-radius: 5px;
            font-family: 'JetBrains Mono', monospace; cursor: pointer; transition: 0.3s;
            transform: translate(-50%, -50%);
        }
        .pos-btn:hover { border-color: var(--gold); color: var(--gold); }
        .pos-btn.selected { border-color: var(--gold); color: var(--gold); background: rgba(200,168,75,0.15); }

        #pos-mp { top: 0%; left: 20%; }
        #pos-co { top: 0%; left: 80%; }
        #pos-btn { top: 50%; left: 100%; }
        #pos-sb { top: 100%; left: 80%; }
        #pos-bb { top: 100%; left: 20%; }
        #pos-utg { top: 50%; left: 0%; }

        .hero-panel, .board-panel { text-align: center; margin-top: 10px; }
        .hero-cards { display: flex; justify-content: center; gap: 20px; margin: 15px 0; }

        .card-slot {
            width: 70px; height: 98px;
            border: 2px dashed var(--border); border-radius: 9px;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            font-family: 'Cormorant Garamond', serif; cursor: pointer; transition: 0.3s;
            background: rgba(0,0,0,0.2); color: var(--gold); font-size: 24px;
        }
        .card-slot:hover { border-color: var(--gold); background: rgba(200,168,75,0.1); }
        .card-slot.filled { background: var(--card-bg); border: 2px solid var(--gold); border-style: solid; }
        .card-slot .val { font-size: 32px; font-weight: 600; line-height: 1; }
        .card-slot .suit { font-size: 24px; line-height: 1; }
        .suit-red { color: var(--red); }
        .suit-black { color: #111; }

        .gold-btn {
            background: var(--gold); color: var(--bg); border: none; padding: 12px 25px;
            font-family: 'Outfit', sans-serif; font-weight: 600; font-size: 16px;
            border-radius: 6px; cursor: pointer; transition: 0.3s;
        }
        .gold-btn:disabled { background: var(--border); color: var(--text3); cursor: not-allowed; }
        .gold-btn:not(:disabled):hover { background: var(--gold2); }

        /* Estilos Únicos da Gaveta (Universal) */
        .drawer-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(8, 14, 11, 0.90);
            display: flex; justify-content: center; align-items: center; z-index: 200;
        }
        .drawer-overlay.hidden { display: none; }
        .drawer-panel {
            background: var(--bg2); border: 2px solid var(--gold);
            padding: 25px; border-radius: 12px; max-width: 900px; text-align: center;
        }
        .drawer-row { display: flex; justify-content: center; gap: 8px; margin-bottom: 12px; }
        .drawer-card {
            width: 50px; height: 75px; background: var(--card-bg); border: 2px solid transparent; border-radius: 6px;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            font-family: 'Cormorant Garamond', serif; cursor: pointer; transition: 0.2s; user-select: none;
        }
        .drawer-card .d-val { font-size: 24px; font-weight: 600; line-height: 1; }
        .drawer-card .d-suit { font-size: 20px; line-height: 1; }
        .drawer-card:hover:not(.disabled) { transform: translateY(-3px); box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .drawer-card.selected { border-color: var(--gold); background: var(--gold); }
        .drawer-card.selected .d-val, .drawer-card.selected .d-suit { color: var(--bg) !important; }
        .drawer-card.disabled { opacity: 0.2; cursor: not-allowed; filter: grayscale(100%); }
    </style>
</head>
<body>
<header>
    <h1>♠ Poker Advisor</h1>
</header>

<main>
    <!-- 1. Mesa e Posições -->
    <div class = "poker-table-container">
        <div class = "poker-table">
            <button class = "pos-btn" id = "pos-mp">MP</button>
            <button class = "pos-btn" id = "pos-co">CO</button>
            <button class = "pos-btn" id = "pos-btn">BTN</button>
            <button class = "pos-btn" id = "pos-sb">SB</button>
            <button class = "pos-btn" id = "pos-bb">BB</button>
            <button class = "pos-btn" id = "pos-utg">UTG</button>
        </div>
    </div>

    <!-- 2. Painel do Herói -->
    <div class = "hero-panel">
        <label style = "font-family: 'JetBrains Mono', monospace; color: var(--text2); font-size: 14px;">MÃO DO
            HERÓI</label>

        <div style = "margin-top: 15px;" id = "hero-btn-container">
            <button class = "gold-btn" onclick = "abrirGaveta('hero', 2)">Selecionar Mão (2 cartas)</button>
        </div>

        <!-- Slots clicáveis para reabrir a gaveta e editar -->
        <div class = "hero-cards" id = "hero-slots" style = "display: none;" onclick = "abrirGaveta('hero', 2)"
             title = "Clique para editar">
            <div class = "card-slot" id = "hero-slot-0"></div>
            <div class = "card-slot" id = "hero-slot-1"></div>
        </div>

        <button id = "btn-analisar" class = "gold-btn" style = "margin-top: 10px;" disabled>Ver análise GTO</button>
        <h2 id = "resultado-api" style = "font-size: 24px; margin-top: 15px; letter-spacing: 1px; color: var(--text2);">
            Selecione sua Posição e Cartas</h2>
    </div>

    <!-- 3. Painel do Board (Flop) -->
    <div class = "board-panel" style = "margin-top: 20px; border-top: 1px dashed var(--border); padding-top: 20px;">
        <label style = "font-family: 'JetBrains Mono', monospace; color: var(--text2); font-size: 14px;">CARTAS DA MESA
            (BOARD)</label>

        <div style = "margin-top: 15px;" id = "board-btn-container">
            <button id = "btn-open-flop" class = "gold-btn" onclick = "abrirGaveta('flop', 3)" disabled>Selecionar Flop
                (3
                cartas)
            </button>
        </div>

        <!-- Slots clicáveis para reabrir a gaveta e editar -->
        <div class = "hero-cards" id = "board-slots" style = "display: none;" onclick = "abrirGaveta('flop', 3)"
             title = "Clique para editar">
            <div class = "card-slot" id = "board-slot-0"></div>
            <div class = "card-slot" id = "board-slot-1"></div>
            <div class = "card-slot" id = "board-slot-2"></div>
        </div>

        <h2 id = "resultado-equidade"
            style = "font-size: 24px; margin-top: 15px; letter-spacing: 1px; color: var(--text2); display: none;">Pronto
            para calcular Equidade...</h2>
    </div>
</main>

<!-- Gaveta Universal (Serve para Herói, Flop, Turn e River) -->
<div id = "drawer-overlay" class = "drawer-overlay hidden">
    <div class = "drawer-panel">
        <h3 style = "margin-top: 0; color: var(--gold);">Selecione <span id = "drawer-count-needed">X</span> cartas</h3>
        <div id = "drawer-container"></div>
        <div style = "margin-top: 20px; display: flex; justify-content: center; gap: 15px;">
            <button id = "btn-confirm-drawer" class = "gold-btn" disabled onclick = "confirmarGaveta()">Confirmar
                Seleção
            </button>
            <button class = "gold-btn"
                    style = "background: transparent; border: 1px solid var(--border); color: var(--text);"
                    onclick = "fecharGaveta()">Cancelar
            </button>
        </div>
    </div>
</div>

<script>
    // --- ESTADO GLOBAL ---
    let posicaoSelecionada = null;
    let maoHeroi = []; // Array flexível
    let cartasBoard = [];

    // Estado da Gaveta
    let contextoAtual = ''; // 'hero' ou 'flop'
    let qtdCartasNecessarias = 0;
    let gavetaSelecaoTemporaria = [];

    // --- REFERÊNCIAS UI ---
    const btnAnalisar = document.getElementById('btn-analisar');
    const displayResultado = document.getElementById('resultado-api');
    const btnOpenFlop = document.getElementById('btn-open-flop');
    const resultadoEquidade = document.getElementById('resultado-equidade');

    const drawerOverlay = document.getElementById('drawer-overlay');
    const drawerContainer = document.getElementById('drawer-container');
    const btnConfirmDrawer = document.getElementById('btn-confirm-drawer');

    // 1. LÓGICA DA MESA (POSIÇÕES)
    document.querySelectorAll('.pos-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            document.querySelectorAll('.pos-btn').forEach(b => b.classList.remove('selected'));
            this.classList.add('selected');
            posicaoSelecionada = this.innerText;
            verificarProntidao();
        });
    });

    // 2. A GAVETA UNIVERSAL
    const naipesOrdem = [
        { s: '♦', c: 'suit-red' },   // Ouros
        { s: '♠', c: 'suit-black' }, // Espadas
        { s: '♥', c: 'suit-red' },   // Copas
        { s: '♣', c: 'suit-black' }  // Paus
    ];
    const valoresOrdem = ['A', 'K', 'Q', 'J', 'T', '9', '8', '7', '6', '5', '4', '3', '2'];

    function construirGaveta() {
        drawerContainer.innerHTML = '';
        naipesOrdem.forEach(naipeObj => {
            const linha = document.createElement('div');
            linha.className = 'drawer-row';
            valoresOrdem.forEach(val => {
                const idCarta = val + naipeObj.s;
                const cartaDiv = document.createElement('div');
                cartaDiv.className = 'drawer-card';
                cartaDiv.id = `drawer-c-${idCarta}`;
                cartaDiv.innerHTML = `<span class="d-val ${naipeObj.c}">${val}</span><span class="d-suit ${naipeObj.c}">${naipeObj.s}</span>`;
                cartaDiv.onclick = () => clicarCartaGaveta(cartaDiv, val, naipeObj.s);
                linha.appendChild(cartaDiv);
            });
            drawerContainer.appendChild(linha);
        });
    }

    function abrirGaveta(contexto, qtd) {
        contextoAtual = contexto;
        qtdCartasNecessarias = qtd;
        document.getElementById('drawer-count-needed').innerText = qtd;
        construirGaveta(); // Recria a gaveta limpa

        // Carrega as cartas que o usuário JÁ TINHA escolhido para este contexto
        if (contexto === 'hero') gavetaSelecaoTemporaria = [...maoHeroi];
        else if (contexto === 'flop') gavetaSelecaoTemporaria = [...cartasBoard];

        // Pinta de dourado as que já estavam escolhidas
        gavetaSelecaoTemporaria.forEach(carta => {
            const el = document.getElementById(`drawer-c-${carta.valor}${carta.naipe}`);
            if(el) el.classList.add('selected');
        });

        // Lógica de Bloqueio Cruzado (Não deixa escolher a carta que o outro painel está usando)
        let cartasParaBloquear = [];
        if (contexto === 'hero') cartasParaBloquear = cartasBoard;
        if (contexto === 'flop') cartasParaBloquear = maoHeroi;

        cartasParaBloquear.forEach(carta => {
            if(carta) {
                const elBloqueado = document.getElementById(`drawer-c-${carta.valor}${carta.naipe}`);
                if(elBloqueado) elBloqueado.classList.add('disabled');
            }
        });

        btnConfirmDrawer.disabled = gavetaSelecaoTemporaria.length !== qtdCartasNecessarias;
        drawerOverlay.classList.remove('hidden');
    }

    function fecharGaveta() { drawerOverlay.classList.add('hidden'); }

    function clicarCartaGaveta(elemento, valor, naipe) {
        if (elemento.classList.contains('disabled')) return;
        const index = gavetaSelecaoTemporaria.findIndex(c => c.valor === valor && c.naipe === naipe);

        if (index > -1) {
            // Desmarca
            gavetaSelecaoTemporaria.splice(index, 1);
            elemento.classList.remove('selected');
        } else {
            // Marca (se não estourou o limite)
            if (gavetaSelecaoTemporaria.length < qtdCartasNecessarias) {
                gavetaSelecaoTemporaria.push({ valor, naipe });
                elemento.classList.add('selected');
            }
        }
        // Libera o botão só quando atingir o número exato
        btnConfirmDrawer.disabled = gavetaSelecaoTemporaria.length !== qtdCartasNecessarias;
    }

   function confirmarGaveta() {
            if (contextoAtual === 'hero') {
                maoHeroi = [...gavetaSelecaoTemporaria];
                renderizarSlots('hero', maoHeroi);
                verificarProntidao();
            } else if (contextoAtual === 'flop') {
                cartasBoard = [...gavetaSelecaoTemporaria];
                renderizarSlots('board', cartasBoard);

                // --- AGORA SIM: A PONTE PARA O MONTE CARLO ---
                resultadoEquidade.style.display = 'block';
                resultadoEquidade.innerText = "Rodando simulações no Java...";
                resultadoEquidade.style.color = "var(--text)";

                // Empacota as cartas. Ex: "A♠,K♠" e "7♦,8♦,9♦"
                const heroStr = maoHeroi.map(c => c.valor + c.naipe).join(',');
                const boardStr = cartasBoard.map(c => c.valor + c.naipe).join(',');

                // Dispara o pacote HTTP para a sua rota nova no Main.java
                fetch(`/api/equidade?hero=${encodeURIComponent(heroStr)}&board=${encodeURIComponent(boardStr)}`)
                    .then(r => r.json())
                    .then(dados => {
                        resultadoEquidade.innerText = `🔥 Equidade (Vitória): ${dados.equidade}%`;
                        resultadoEquidade.style.color = "var(--gold)";
                    })
                    .catch(() => {
                        resultadoEquidade.innerText = "Erro na simulação. O Java chiou!";
                        resultadoEquidade.style.color = "red";
                    });
            }
            fecharGaveta();
        }

    // 3. RENDERIZADOR UNIVERSAL DE SLOTS
    function renderizarSlots(prefixo, arrayCartas) {
        // Esconde o botão e mostra os quadrados
        document.getElementById(`${prefixo}-btn-container`).style.display = 'none';
        document.getElementById(`${prefixo}-slots`).style.display = 'flex';

        arrayCartas.forEach((carta, i) => {
            const slot = document.getElementById(`${prefixo}-slot-${i}`);
            slot.classList.add('filled');
            const corClass = (carta.naipe === '♥' || carta.naipe === '♦') ? 'suit-red' : 'suit-black';
            slot.innerHTML = `<span class="val ${corClass}">${carta.valor}</span><span class="suit ${corClass}">${carta.naipe}</span>`;
        });
    }

    // 4. MOTOR DE GTO E VALIDAÇÕES
    function gerarNotacaoGTO() {
        const peso = { 'A':14, 'K':13, 'Q':12, 'J':11, 'T':10, '9':9, '8':8, '7':7, '6':6, '5':5, '4':4, '3':3, '2':2 };
        let c1 = maoHeroi[0];
        let c2 = maoHeroi[1];
        if (peso[c2.valor] > peso[c1.valor]) { let temp = c1; c1 = c2; c2 = temp; }
        if (c1.valor === c2.valor) return c1.valor + c2.valor;
        return c1.valor + c2.valor + (c1.naipe === c2.naipe ? 'S' : 'O');
    }

    function verificarProntidao() {
        if (posicaoSelecionada && maoHeroi.length === 2) {
            btnAnalisar.disabled = false;
            btnOpenFlop.disabled = false; // Libera o board!
            displayResultado.innerText = `Pronto: ${gerarNotacaoGTO()} no ${posicaoSelecionada}`;
            displayResultado.style.color = "var(--gold)";
        }
    }

    // 5. CHAMADA API GTO
    btnAnalisar.addEventListener('click', () => {
        const mao = gerarNotacaoGTO();
        displayResultado.innerText = "Consultando Java Backend...";
        displayResultado.style.color = "var(--text)";

        fetch(`/api/gto?pos=${posicaoSelecionada}&mao=${mao}`)
            .then(r => r.json())
            .then(dados => {
                displayResultado.innerText = `${mao} no ${posicaoSelecionada}: ${dados.acao}`;
                if (dados.acao === 'RAISE') displayResultado.style.color = '#4caf80';
                else if (dados.acao === 'CALL') displayResultado.style.color = '#e8c96d';
                else displayResultado.style.color = '#ef9a9a';
            })
            .catch(() => {
                displayResultado.innerText = "Erro ao conectar com o Servidor Java!";
                displayResultado.style.color = "red";
            });
    });
</script>
</body>
</html>
